<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnderDefense OSINT Portal</title>
    <style>
        :root {
            --bg-main: #070a0f;
            --bg-card: #111823;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --ud-accent: #00e5ff;
            --border-color: #1e293b;
            --btn-bg: #1e293b;
            --form-bg: #0d131f;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
            background-image:
                linear-gradient(rgba(0, 229, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 229, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            color: var(--ud-accent);
            font-size: 2.8em;
            margin-bottom: 5px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1em;
            font-family: monospace;
        }

        .controls {
            display: flex;
            max-width: 900px;
            margin: 0 auto 40px auto;
            gap: 15px;
        }

        input[type="text"], input[type="text"].form-input, textarea, select {
            flex-grow: 1;
            padding: 16px 20px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background-color: rgba(17, 24, 35, 0.8);
            color: var(--text-main);
            font-size: 16px;
            font-family: monospace;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--ud-accent);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .btn {
            background-color: var(--btn-bg);
            color: var(--ud-accent);
            border: 1px solid var(--border-color);
            padding: 15px 30px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            font-family: monospace;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn:hover {
            background-color: var(--ud-accent);
            color: var(--bg-main);
            border-color: var(--ud-accent);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
        }

        #catalogContainer {
            flex-grow: 1;
        }

        .category-section {
            max-width: 1400px;
            margin: 0 auto 50px auto;
        }

        .section-title {
            color: #fff;
            font-size: 1.5em;
            border-left: 4px solid var(--ud-accent);
            padding-left: 15px;
            margin-bottom: 25px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--ud-accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #2dd4bf;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .card:hover::before {
            transform: scaleX(1);
        }

        .card h3 {
            margin-top: 0;
            color: #fff;
            font-size: 1.2em;
        }

        .card p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-muted);
            flex-grow: 1;
        }

        .tags {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background-color: rgba(0, 229, 255, 0.1);
            color: var(--ud-accent);
            border: 1px solid rgba(0, 229, 255, 0.2);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-family: monospace;
            text-transform: uppercase;
        }

        .card a {
            display: inline-block;
            margin-top: 20px;
            color: var(--ud-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card a:hover {
            text-decoration: underline;
        }

        .report-builder {
            max-width: 900px;
            margin: 60px auto 20px auto;
            background-color: var(--form-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--ud-accent);
            font-family: monospace;
            font-weight: bold;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .tools-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            background-color: rgba(17, 24, 35, 0.5);
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 10px;
        }

        .tool-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            font-size: 13px;
            cursor: pointer;
        }

        .tool-checkbox input {
            accent-color: var(--ud-accent);
        }

        .helper-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 5px;
            display: block;
        }

        .export-panel {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-export {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 15px;
        }

        .btn-export.md { border-color: #d2a8ff; color: #d2a8ff; }
        .btn-export.md:hover { background-color: #d2a8ff; color: var(--bg-main); }

        .btn-export.json { border-color: #f0db4f; color: #f0db4f; }
        .btn-export.json:hover { background-color: #f0db4f; color: var(--bg-main); }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            padding-bottom: 10px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-family: monospace;
            font-size: 14px;
        }

        footer a {
            color: var(--ud-accent);
            text-decoration: none;
            font-weight: bold;
            transition: text-shadow 0.2s;
        }

        footer a:hover {
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>[UD] OSINT Portal</h1>
        <p>Навчальний проект-каталог OSINT для UnderDefense</p>
    </header>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="> Введіть запит для пошуку по базі даних...">
        <button id="exportCsvBtn" class="btn">Експорт каталогу (CSV)</button>
    </div>

    <div id="catalogContainer">
        </div>

    <section class="report-builder" id="reportSection">
        <h2 class="section-title">Генератор OSINT-Звіту</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px; font-family: monospace;">> Заповніть форму. Виберіть формат для завантаження готового звіту.</p>

        <div class="form-row">
            <div class="form-group">
                <label for="repAuthor">Автор / Група (ПІБ):</label>
                <input type="text" id="repAuthor" class="form-input" placeholder="Іванов І.І., Група 3">
            </div>
            <div class="form-group">
                <label for="repTLP">Класифікація інформації (TLP):</label>
                <select id="repTLP">
                    <option value="TLP:CLEAR">TLP:CLEAR (Публічні відкриті дані)</option>
                    <option value="TLP:GREEN">TLP:GREEN (Тільки для учасників івенту)</option>
                    <option value="TLP:AMBER">TLP:AMBER (Чутливі знахідки)</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="repApt">Досліджуване угрупування:</label>
                <input type="text" id="repApt" class="form-input" placeholder="Напр. APT28, Fancy Bear...">
            </div>
            <div class="form-group">
                <label for="repCurator">Куратор (Спонсор):</label>
                <select id="repCurator">
                    <option value="ГРУ">ГРУ (Військова розвідка)</option>
                    <option value="ФСБ">ФСБ (Внутрішня безпека)</option>
                    <option value="СВР">СВР (Зовнішня розвідка)</option>
                    <option value="Невідомо">Невідомо / Фінансово мотивовані</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="repTargets">Цілі та жертви: </label>
            <textarea id="repTargets" placeholder="Опишіть сектори, які атакує угрупування..."></textarea>
        </div>

        <div class="form-group">
            <label>Використані OSINT інструменти (з порталу):</label>
            <div class="tools-selection" id="repToolsSelection">
                </div>
            <input type="text" id="repCustomTools" class="form-input" placeholder="Додаткові інструменти (через кому)">
        </div>

        <div class="form-group">
            <label for="repSources">Посилання на джерела (URLs):</label>
            <span class="helper-text">* Введіть по одному посиланню на рядок.</span>
            <textarea id="repSources" placeholder="https://attack.mitre.org/...&#10;https://www.fbi.gov/..."></textarea>
        </div>

        <div class="form-group">
            <label for="repConclusions">Аналітичні висновки та техніки (MITRE):</label>
            <textarea id="repConclusions" placeholder="Загальний висновок, виявлені патерни, ТТП..." style="min-height: 150px;"></textarea>
        </div>

        <label style="color: var(--ud-accent); font-family: monospace; font-weight: bold; margin-bottom: 10px; display: block;">Завантажити звіт у форматі:</label>
        <div class="export-panel">
            <button id="btnExportTxt" class="btn btn-export">📄 .TXT</button>
            <button id="btnExportMd" class="btn btn-export md">📝 .MARKDOWN</button>
            <button id="btnExportJson" class="btn btn-export json">⚙️ .JSON</button>
        </div>
    </section>

    <footer>
        <p>Створено: <a href="https://www.linkedin.com/in/illyavaschuk/" target="_blank">Іллею Ващуком</a> | UnderDefense 2026</p>
    </footer>

    <script>
        const tools = [
            { category: "Threat Intelligence та Атрибуція", name: "MITRE ATT&CK", desc: "База даних угрупувань, їхніх псевдонімів, технік атаки та програмного забезпечення.", link: "https://attack.mitre.org/groups/", tags: ["Threat Intel", "TTPs"] },
            { category: "Threat Intelligence та Атрибуція", name: "AlienVault OTX", desc: "Глобальна спільнота з кіберрозвідки. Дозволяє шукати індикатори компрометації (IoC).", link: "https://otx.alienvault.com/", tags: ["IoC", "Network"] },
            { category: "Threat Intelligence та Атрибуція", name: "Malpedia", desc: "Ресурс для атрибуції шкідливого ПЗ до конкретних APT.", link: "https://malpedia.caad.fkie.fraunhofer.de/", tags: ["Malware", "Атрибуція"] },
            { category: "Threat Intelligence та Атрибуція", name: "NIST NVD", desc: "Національна база даних вразливостей (CVE) уряду США.", link: "https://nvd.nist.gov/", tags: ["CVE", "Vulnerabilities"] },
            { category: "Threat Intelligence та Атрибуція", name: "GreyNoise", desc: "Платформа, що збирає дані про масове сканування інтернету. Відфільтровує 'білий шум'.", link: "https://www.greynoise.io/", tags: ["C2", "Scanners", "Noise"] },

            { category: "Військова розвідка (GEOINT & SIGINT)", name: "Sentinel Hub EO Browser", desc: "Доступ до супутникових знімків для аналізу місцевості.", link: "https://apps.sentinel-hub.com/eo-browser/", tags: ["GEOINT", "Satellites"] },
            { category: "Військова розвідка (GEOINT & SIGINT)", name: "ADS-B Exchange", desc: "Найбільша база невідфільтрованих польотних даних.", link: "https://globe.adsbexchange.com/", tags: ["Flight", "Military"] },
            { category: "Військова розвідка (GEOINT & SIGINT)", name: "SunCalc", desc: "Інструмент для визначення руху сонця та фаз освітлення.", link: "https://www.suncalc.org/", tags: ["GEOINT", "Shadows"] },
            { category: "Військова розвідка (GEOINT & SIGINT)", name: "WebSDR", desc: "Мережа радіоприймачів для прослуховування радіоефіру.", link: "http://websdr.org/", tags: ["SIGINT", "Radio"] },
            { category: "Військова розвідка (GEOINT & SIGINT)", name: "FIRMS (NASA)", desc: "Система відстеження пожеж та теплових аномалій.", link: "https://firms.modaps.eosdis.nasa.gov/", tags: ["GEOINT", "Thermal"] },

            { category: "Аналіз інфраструктури", name: "Shodan", desc: "Спеціалізований пошуковик для підключених до інтернету пристроїв.", link: "https://www.shodan.io/", tags: ["IoT", "Search"] },
            { category: "Аналіз інфраструктури", name: "Censys", desc: "Альтернатива Shodan для пошуку серверів та сертифікатів.", link: "https://search.censys.io/", tags: ["Certificates", "Infrastructure"] },
            { category: "Аналіз інфраструктури", name: "SecurityTrails API", desc: "Доступ до поточних та історичних DNS-записів та WHOIS.", link: "https://securitytrails.com/", tags: ["DNS", "WHOIS"] },
            { category: "Аналіз інфраструктури", name: "BGPView", desc: "Інструмент для відстеження маршрутизації BGP та IP-адрес.", link: "https://bgpview.io/", tags: ["BGP", "IP"] },
            { category: "Аналіз інфраструктури", name: "BuiltWith", desc: "Профайлер для ідентифікації технологій на вебсайтах.", link: "https://builtwith.com/", tags: ["Profiling", "Tech Stack"] },

            { category: "Розвідка та Субдомени (Recon)", name: "Amass", desc: "Глибоке виявлення активів та мапування мережі.", link: "https://github.com/owasp-amass/amass", tags: ["Recon", "Network Mapping"] },
            { category: "Розвідка та Субдомени (Recon)", name: "theHarvester", desc: "Збір субдоменів, відкритих портів та email-адрес.", link: "https://github.com/laramies/theHarvester", tags: ["Emails", "Subdomains"] },
            { category: "Розвідка та Субдомени (Recon)", name: "Subfinder", desc: "Швидкий інструмент для пасивного виявлення субдоменів.", link: "https://github.com/projectdiscovery/subfinder", tags: ["Subdomains", "Recon"] },
            { category: "Розвідка та Субдомени (Recon)", name: "DNSDumpster", desc: "Дослідження доменів та виявлення хостів.", link: "https://dnsdumpster.com/", tags: ["DNS", "Recon"] },
            { category: "Розвідка та Субдомени (Recon)", name: "Nmap", desc: "Мережевий та портовий сканер.", link: "https://nmap.org/", tags: ["Scanner", "Network"] },

            { category: "Ідентифікація та Витоки Даних", name: "IntelligenceX", desc: "Пошук по даркнету, витокам даних та публічному вебу.", link: "https://intelx.io/", tags: ["Leaks", "Darknet"] },
            { category: "Ідентифікація та Витоки Даних", name: "FBI Cyber Most Wanted", desc: "Індиктменти, фотографії та реальні імена хакерів.", link: "https://www.fbi.gov/wanted/cyber", tags: ["Ідентифікація"] },
            { category: "Ідентифікація та Витоки Даних", name: "Have I Been Pwned?", desc: "Перевірка компрометації облікових записів.", link: "https://haveibeenpwned.com/", tags: ["Compromise", "Breaches"] },
            { category: "Ідентифікація та Витоки Даних", name: "Sherlock", desc: "Пошук акаунтів соціальних мереж за нікнеймом.", link: "https://github.com/sherlock-project/sherlock", tags: ["Social Media", "Usernames"] },
            { category: "Ідентифікація та Витоки Даних", name: "OSINT Framework", desc: "Величезне інтерактивне дерево ресурсів для пошуку інформації.", link: "https://osintframework.com/", tags: ["OSINT", "Framework"] },
            { category: "Ідентифікація та Витоки Даних", name: "Hunter.io", desc: "Пошук email-адрес, пов'язаних з доменом.", link: "https://hunter.io/", tags: ["Emails", "Recon"] },

            { category: "Мультитули та Аналіз", name: "SpiderFoot", desc: "Автоматизація OSINT з понад 100 джерел (Репозиторій GitHub).", link: "https://github.com/smicallef/spiderfoot", tags: ["Automation", "OSINT"] },
            { category: "Мультитули та Аналіз", name: "Maltego", desc: "Глибока цифрова розвідка та візуалізація зв'язків.", link: "https://www.maltego.com/", tags: ["Visual Analysis", "Framework"] },
            { category: "Мультитули та Аналіз", name: "Recon-ng", desc: "Фреймворк для веб-розвідки (Python).", link: "https://github.com/lanmaster53/recon-ng", tags: ["Framework", "Python"] },
            { category: "Мультитули та Аналіз", name: "Triage Malware Sandbox", desc: "Пісочниця для аналізу шкідливого ПЗ (Hatching Triage).", link: "https://tria.ge/", tags: ["Sandbox", "Аналіз"] },
            { category: "Мультитули та Аналіз", name: "Google Dorks", desc: "Спеціалізовані запити Google Hacking Database.", link: "https://www.exploit-db.com/google-hacking-database", tags: ["Dorks", "Search"] }
        ];

        const catalogContainer = document.getElementById('catalogContainer');
        const searchInput = document.getElementById('searchInput');
        const exportBtn = document.getElementById('exportCsvBtn');
        const toolsSelection = document.getElementById('repToolsSelection');

        let currentFilteredTools = tools;
        function populateToolCheckboxes() {
            const sortedTools = [...tools].sort((a, b) => a.name.localeCompare(b.name));
            sortedTools.forEach(tool => {
                const label = document.createElement('label');
                label.className = 'tool-checkbox';
                label.innerHTML = `<input type="checkbox" value="${tool.name}"> ${tool.name}`;
                toolsSelection.appendChild(label);
            });
        }

        function groupByCategory(toolsArray) {
            return toolsArray.reduce((acc, tool) => {
                if (!acc[tool.category]) acc[tool.category] = [];
                acc[tool.category].push(tool);
                return acc;
            }, {});
        }

        function displayTools(toolsToDisplay) {
            catalogContainer.innerHTML = '';
            const grouped = groupByCategory(toolsToDisplay);
            for (const [category, categoryTools] of Object.entries(grouped)) {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<h2 class="section-title">${category}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                categoryTools.forEach(tool => {
                    const tagsHtml = tool.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                    grid.innerHTML += `
                        <div class="card">
                            <h3>${tool.name}</h3>
                            <p>${tool.desc}</p>
                            <div class="tags">${tagsHtml}</div>
                            <a href="${tool.link}" target="_blank">Launch Tool ↗</a>
                        </div>`;
                });
                section.appendChild(grid);
                catalogContainer.appendChild(section);
            }
            if (toolsToDisplay.length === 0) {
                catalogContainer.innerHTML = '<div style="text-align:center; color: var(--text-muted); font-family: monospace; margin-top: 40px;">> Даних не знайдено...</div>';
            }
        }

        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            currentFilteredTools = tools.filter(tool =>
                tool.name.toLowerCase().includes(searchTerm) ||
                tool.desc.toLowerCase().includes(searchTerm) ||
                tool.tags.some(tag => tag.toLowerCase().includes(searchTerm)) ||
                tool.category.toLowerCase().includes(searchTerm)
            );
            displayTools(currentFilteredTools);
        });

        exportBtn.addEventListener('click', () => {
            let csvContent = "\uFEFFКатегорія,Назва,Опис,Посилання,Теги\n";
            currentFilteredTools.forEach(tool => {
                csvContent += `"${tool.category}","${tool.name}","${tool.desc}","${tool.link}","${tool.tags.join(', ')}"\n`;
            });
            downloadFile(csvContent, "ud_osint_tools.csv", "text/csv");
        });

        function getReportData() {
            const author = document.getElementById('repAuthor').value || "Не вказано";
            const tlp = document.getElementById('repTLP').value;
            const apt = document.getElementById('repApt').value || "Не вказано";
            const curator = document.getElementById('repCurator').value;
            const targets = document.getElementById('repTargets').value || "Дані відсутні";
            const sources = document.getElementById('repSources').value || "Дані відсутні";
            const conclusions = document.getElementById('repConclusions').value || "Дані відсутні";
            const customTools = document.getElementById('repCustomTools').value;

            const selectedCheckboxes = document.querySelectorAll('#repToolsSelection input:checked');
            let toolsArray = Array.from(selectedCheckboxes).map(cb => cb.value);
            if (customTools.trim() !== "") toolsArray.push(...customTools.split(',').map(t => t.trim()));

            return {
                date: new Date().toISOString().split('T')[0],
                author, tlp, apt, curator, targets, sources, conclusions,
                tools: toolsArray.length > 0 ? toolsArray : ["Не вказано"]
            };
        }

        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: `${mimeType};charset=utf-8;` });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function getSafeFilename(apt, date, ext) {
            const safeAptName = apt.replace(/[^a-z0-9а-яієїґ]/gi, '_').toLowerCase() || 'report';
            return `osint_report_${safeAptName}_${date}.${ext}`;
        }

        document.getElementById('btnExportTxt').addEventListener('click', () => {
            const d = getReportData();
            const text = `=========================================
OSINT АНАЛІТИЧНИЙ ЗВІТ (UNDERDEFENSE EVENT)
=========================================
ДАТА: ${d.date} | АВТОР: ${d.author} | ${d.tlp}

1. ДОСЛІДЖУВАНЕ УГРУПУВАННЯ
-----------------------------------------
Назва/Псевдоніми: ${d.apt}
Куратор (Спонсор): ${d.curator}

2. ЦІЛІ ТА ЖЕРТВИ
-----------------------------------------
${d.targets}

3. АНАЛІТИЧНІ ВИСНОВКИ (MITRE ТТП)
-----------------------------------------
${d.conclusions}

4. ІНСТРУМЕНТИ ТА ДЖЕРЕЛА
-----------------------------------------
Інструменти: ${d.tools.join(', ')}
Джерела:
${d.sources}`;
            downloadFile(text, getSafeFilename(d.apt, d.date, 'txt'), 'text/plain');
        });

        document.getElementById('btnExportMd').addEventListener('click', () => {
            const d = getReportData();
            const md = ` 🛡️ OSINT Аналітичний Звіт

> Подія: UnderDefense Internal Event 2026
> Дата: ${d.date}
> Автор: ${d.author}
> Класифікація: \`${d.tlp}\`

🎯 1. Досліджуване угрупування
  Назва / Псевдоніми: ${d.apt}
  Куратор (Спонсор): ${d.curator}

🌍 2. Цілі та жертви
${d.targets}

🧠 3. Аналітичні висновки (MITRE TTPs)
${d.conclusions}

🛠️ 4. Використана методологія
  Інструменти: ${d.tools.join(', ')}

 🔗 5. Джерела
${d.sources.split('\n').map(s => s.trim() ? `- ${s}` : '').join('\n')}
`;
            downloadFile(md, getSafeFilename(d.apt, d.date, 'md'), 'text/markdown');
        });

        document.getElementById('btnExportJson').addEventListener('click', () => {
            const d = getReportData();
            const json = JSON.stringify(d, null, 4);
            downloadFile(json, getSafeFilename(d.apt, d.date, 'json'), 'application/json');
        });

        displayTools(tools);
        populateToolCheckboxes();
    </script>
</body>
</html>
